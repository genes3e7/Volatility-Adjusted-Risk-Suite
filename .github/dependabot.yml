version: 2
updates:
  # Enable version updates for pip
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    # Optional: Increase open pull request limit (default is 5)
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "automated"
    # Automatically assign these users
    assignees:
      - "genes3e7"
    # Request these reviewers (recommended to use CODEOWNERS instead)
    reviewers:
      - "genes3e7"
